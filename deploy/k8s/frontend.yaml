apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudcostlab-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudcostlab-frontend
  template:
    metadata:
      labels:
        app: cloudcostlab-frontend
    spec:
      containers:
        - name: frontend
          image: cloudcostlab-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: cloudcostlab-frontend
spec:
  type: NodePort
  selector:
    app: cloudcostlab-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
